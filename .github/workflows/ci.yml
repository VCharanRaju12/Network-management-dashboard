name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: netdash
          POSTGRES_PASSWORD: netdash
          POSTGRES_DB: netdash_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netdash"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://netdash:netdash@localhost:5432/netdash_test
        run: alembic upgrade head

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://netdash:netdash@localhost:5432/netdash_test
        run: pytest -v

      - name: Verify app imports cleanly
        env:
          DATABASE_URL: postgresql+asyncpg://netdash:netdash@localhost:5432/netdash_test
        run: python -c "from app.main import app; print(f'{len(app.routes)} routes registered')"

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
