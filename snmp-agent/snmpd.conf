# Minimal snmpd config for a local test agent.
# rocommunity = read-only community string 'public', allowed from anywhere
# (fine for an isolated local Docker network; never do this on a real
# internet-facing device).
#
# NOTE: deliberately NOT setting `agentAddress` here — on Debian/Ubuntu
# builds of net-snmp, explicitly setting it to udp:0.0.0.0:161 triggers
# a known double-bind bug (two bind() calls to the same address; the
# second fails with EADDRINUSE, surfaced as the generic "Error opening
# specified endpoint" message). Leaving it unset makes snmpd fall back
# to its default of listening on 0.0.0.0:161, which works correctly.

rocommunity public 0.0.0.0/0

sysLocation Local test container
sysContact admin@example.com
sysName snmp-agent