services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: netdash
      POSTGRES_PASSWORD: netdash
      POSTGRES_DB: netdash
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netdash"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # A real, standard Linux SNMP agent (net-snmp) for testing — read-only,
  # community string "public". This is what you'll add as a Device to see
  # genuine CPU/memory/interface metrics without needing enterprise gear.
  snmp-agent:
       image: polinux/snmpd
       volumes:
         - ./snmp-agent/snmpd.conf:/etc/snmpd/snmpd.conf
       command: ["-c", "/etc/snmpd/snmpd.conf"]
       ports:
         - "1161:161/udp"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    environment:
      VITE_API_PROXY_TARGET: "http://backend:8000"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
